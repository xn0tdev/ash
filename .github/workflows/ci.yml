name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build (dev version)
        run: wails build

      - name: Verify binary
        shell: pwsh
        run: |
          if (-not (Test-Path "build\bin\Ash.exe")) { throw "Ash.exe not built" }
          Write-Host "Built $((Get-Item 'build\bin\Ash.exe').Length) bytes"
